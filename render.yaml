services:
  - type: web
    name: dara-lend-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: ALEO_RPC_URL
        value: https://api.explorer.provable.com/v1
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health
